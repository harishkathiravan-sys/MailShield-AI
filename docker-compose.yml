version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mailshield_postgres
    environment:
      POSTGRES_USER: mailshield
      POSTGRES_PASSWORD: securepass123
      POSTGRES_DB: mailshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mailshield_network

  backend:
    build: ./backend
    container_name: mailshield_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mailshield:securepass123@postgres:5432/mailshield
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      - postgres
    networks:
      - mailshield_network

  sandbox:
    build: ./backend/sandbox
    container_name: mailshield_sandbox
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mailshield_network

volumes:
  postgres_data:

networks:
  mailshield_network:
    driver: bridge
